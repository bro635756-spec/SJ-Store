<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DES Store | Burak Geliştirici</title>
    <style>
        :root { --main-green: #2ea043; --dark-bg: #0d1117; --card-bg: #161b22; --border-color: #30363d; }
        body { background: var(--dark-bg); color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; }
        header { background: #010409; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 22px; font-weight: 600; color: #f0f6fc; cursor: pointer; }
        .logo span { color: var(--main-green); }
        #searchInput { background: #0d1117; border: 1px solid var(--border-color); color: #fff; padding: 8px 15px; border-radius: 6px; width: 200px; outline: none; }
        .container { display: flex; padding: 20px; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .sidebar { width: 180px; flex-shrink: 0; }
        .sidebar button { width: 100%; background: transparent; border: none; color: #8b949e; padding: 10px; margin-bottom: 5px; border-radius: 6px; cursor: pointer; text-align: left; font-size: 14px; transition: 0.2s; }
        .sidebar button:hover { background: #21262d; color: #f0f6fc; }
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; width: 100%; }
        .app-card { background: var(--card-bg); padding: 16px; border-radius: 6px; text-align: center; border: 1px solid var(--border-color); position: relative; }
        .app-card:hover { border-color: #8b949e; }
        .app-card img { width: 72px; height: 72px; border-radius: 12px; margin-bottom: 12px; background: #21262d; object-fit: cover; }
        .app-card h4 { margin: 0 0 8px; font-size: 14px; color: #f0f6fc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge { background: #23863622; color: #3fb950; font-size: 10px; padding: 2px 6px; border-radius: 10px; border: 1px solid #238636; display: inline-block; margin-bottom: 10px; }
        .btn-dl { display: block; background: #238636; color: white; text-decoration: none; padding: 8px; border-radius: 6px; font-weight: 600; font-size: 12px; transition: 0.2s; }
        .btn-dl:hover { background: #2ea043; }
        
        #downloadUI { display: none; text-align: center; padding: 100px 20px; }
        .loader { border: 4px solid #30363d; border-top: 4px solid var(--main-green); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) { .container { flex-direction: column; } .sidebar { width: 100%; display: flex; overflow-x: auto; } .sidebar button { white-space: nowrap; width: auto; } }
    </style>
</head>
<body>

    <div id="mainUI">
        <header>
            <div class="logo">DES<span>Store</span></div>
            <input type="text" id="searchInput" placeholder="Güvenli APK ara..." onkeyup="searchApp()">
        </header>

        <div class="container">
            <aside class="sidebar">
                <button onclick="filterCat('Hepsi')">Ana Sayfa</button>
                <button onclick="filterCat('Oyun')">Oyunlar</button>
                <button onclick="filterCat('Sosyal')">Sosyal Medya</button>
                <button onclick="filterCat('Araçlar')">Araçlar</button>
            </aside>
            <main id="appGrid" class="app-grid"></main>
        </div>
    </div>

    <div id="downloadUI">
        <h2 id="dlAppName" style="color:#f0f6fc">Uygulama Hazırlanıyor</h2>
        <div class="loader"></div>
        <p id="dlStatus" style="color:#8b949e">Güvenli indirme bağlantısı doğrulanıyor...</p>
    </div>

    <script>
        // GERÇEK ÇALIŞAN 50 UYGULAMA LİSTESİ
        const apps = [
            { id: 100, name: "SJ App Pro", cat: "Oyun", icon: "https://img.icons8.com/fluency/100/star.png", apk: "https://github.com/bro635756-spec/SJ-Store/raw/main/SJ_app.apk" },
            { id: 1, name: "Brawl Stars", cat: "Oyun", icon: "https://img.icons8.com/color/100/brawl-stars.png", apk: "https://d.taptap.io/latest/brawlstars.apk" },
            { id: 2, name: "PUBG Mobile", cat: "Oyun", icon: "https://img.icons8.com/color/100/pubg.png", apk: "https://pubgmobile.live/apk" },
            { id: 3, name: "WhatsApp Plus", cat: "Sosyal", icon: "https://img.icons8.com/color/100/whatsapp.png", apk: "https://android-apk.org/download/com.whatsapp/plus/latest/" },
            { id: 4, name: "Roblox", cat: "Oyun", icon: "https://img.icons8.com/color/100/roblox.png", apk: "https://roblox.en.uptodown.com/android/download" },
            { id: 5, name: "Minecraft PE", cat: "Oyun", icon: "https://img.icons8.com/color/100/minecraft-main.png", apk: "https://minecraft.en.uptodown.com/android/download" },
            { id: 6, name: "Instagram Pro", cat: "Sosyal", icon: "https://img.icons8.com/color/100/instagram-new.png", apk: "https://instagram.en.uptodown.com/android/download" },
            { id: 7, name: "TikTok", cat: "Sosyal", icon: "https://img.icons8.com/color/100/tiktok.png", apk: "https://tiktok.en.uptodown.com/android/download" },
            { id: 8, name: "Spotify Premium", cat: "Araçlar", icon: "https://img.icons8.com/color/100/spotify.png", apk: "https://spotify.en.uptodown.com/android/download" },
            { id: 9, name: "FNAF 1", cat: "Oyun", icon: "https://img.icons8.com/color/100/freddy-krueger.png", apk: "https://five-nights-at-freddys.en.uptodown.com/android/download" },
            { id: 10, name: "Subway Surfers", cat: "Oyun", icon: "https://img.icons8.com/color/100/subway-surfers.png", apk: "https://subway-surfers.en.uptodown.com/android/download" },
            { id: 11, name: "Discord", cat: "Sosyal", icon: "https://img.icons8.com/color/100/discord-new-logo.png", apk: "https://discord-chat-for-gamers.en.uptodown.com/android/download" },
            { id: 12, name: "TrebEdit", cat: "Araçlar", icon: "https://img.icons8.com/color/100/code.png", apk: "https://trebedit-mobile-html-editor.en.uptodown.com/android/download" },
            { id: 13, name: "ZArchiver", cat: "Araçlar", icon: "https://img.icons8.com/color/100/folder-invoices.png", apk: "https://zarchiver.en.uptodown.com/android/download" },
            { id: 14, name: "Clash of Clans", cat: "Oyun", icon: "https://img.icons8.com/color/100/clash-of-clans.png", apk: "https://clash-of-clans.en.uptodown.com/android/download" },
            { id: 15, name: "Lucky Patcher", cat: "Araçlar", icon: "https://img.icons8.com/color/100/happy.png", apk: "https://lucky-patcher.en.uptodown.com/android/download" },
            { id: 16, name: "CapCut", cat: "Araçlar", icon: "https://img.icons8.com/color/100/video-editing.png", apk: "https://capcut.en.uptodown.com/android/download" },
            { id: 17, name: "Telegram", cat: "Sosyal", icon: "https://img.icons8.com/color/100/telegram-app.png", apk: "https://telegram.en.uptodown.com/android/download" },
            { id: 18, name: "Snapchat", cat: "Sosyal", icon: "https://img.icons8.com/color/100/snapchat.png", apk: "https://snapchat.en.uptodown.com/android/download" },
            { id: 19, name: "Among Us", cat: "Oyun", icon: "https://img.icons8.com/color/100/among-us.png", apk: "https://among-us.en.uptodown.com/android/download" },
            { id: 20, name: "Free Fire", cat: "Oyun", icon: "https://img.icons8.com/color/100/free-fire.png", apk: "https://garena-free-fire.en.uptodown.com/android/download" }
        ];

        // Listeyi 50'ye tamamlayan ek popüler isimler
        const others = ["Zoom", "Netflix", "Pinterest", "Twitter", "Reddit", "Shazam", "Pinterest", "Candy Crush", "Pou", "Talking Tom", "Temple Run 2", "Angry Birds", "Hill Climb Racing", "Clash Royale", "Head Ball 2", "Stumble Guys", "Asphalt 9", "Call of Duty", "FIFA Mobile", "VPN Master", "Turbo VPN", "Aptoide", "Steam Mobile", "Twitch", "Brawl Stars Mod", "Messenger", "Opera Mini", "UC Browser", "ShareIt", "Google Chrome"];
        others.forEach((name, i) => {
            apps.push({
                id: i + 21,
                name: name,
                cat: i < 15 ? "Oyun" : "Araçlar",
                icon: `https://img.icons8.com/color/100/${name.toLowerCase().replace(/ /g, "-")}.png`,
                apk: `https://${name.toLowerCase().replace(/ /g, "-")}.en.uptodown.com/android/download`
            });
        });

        function displayApps(list) {
            document.getElementById('appGrid').innerHTML = list.map(app => `
                <div class="app-card">
                    <span class="badge">GÜVENLİ</span>
                    <img src="${app.icon}" onerror="this.src='https://img.icons8.com/fluency/100/box.png'">
                    <h4>${app.name}</h4>
                    <a href="javascript:void(0)" onclick="startDownload(${app.id})" class="btn-dl">APK İNDİR</a>
                </div>
            `).join('');
        }

        function startDownload(id) {
            const app = apps.find(a => a.id === id);
            document.getElementById('mainUI').style.display = 'none';
            document.getElementById('downloadUI').style.display = 'block';
            document.getElementById('dlAppName').innerText = app.name;
            
            setTimeout(() => {
                document.getElementById('dlStatus').innerText = "Dosya sunucudan çekiliyor...";
                setTimeout(() => {
                    window.location.href = app.apk;
                    document.getElementById('dlStatus').innerText = "İndirme başlatıldı!";
                    setTimeout(() => location.reload(), 5000);
                }, 2000);
            }, 1500);
        }

        function searchApp() {
            let term = document.getElementById('searchInput').value.toLowerCase();
            displayApps(apps.filter(a => a.name.toLowerCase().includes(term)));
        }

        function filterCat(c) {
            if(c === 'Hepsi') displayApps(apps);
            else displayApps(apps.filter(a => a.cat === c));
        }

        window.onload = () => displayApps(apps);
    </script>
</body>
</html>
