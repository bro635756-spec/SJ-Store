<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DES Store | Burak Geliştirici</title>
    <style>
        :root { --main-green: #238636; --dark-bg: #0b0f19; --card-bg: #161b22; --border-color: #30363d; }
        body { background: var(--dark-bg); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
        header { background: var(--card-bg); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--main-green); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .logo { font-size: 26px; font-weight: bold; cursor: pointer; }
        .logo span { color: var(--main-green); }
        #searchInput { background: #0d1117; border: 1px solid var(--border-color); color: #fff; padding: 12px 25px; border-radius: 25px; width: 300px; outline: none; transition: 0.3s; }
        #searchInput:focus { border-color: var(--main-green); box-shadow: 0 0 10px rgba(35, 134, 54, 0.3); }
        .container { display: flex; padding: 25px; gap: 25px; }
        .sidebar { width: 220px; flex-shrink: 0; }
        .sidebar button { width: 100%; background: var(--card-bg); border: 1px solid var(--border-color); color: white; padding: 15px; margin-bottom: 12px; border-radius: 10px; cursor: pointer; text-align: left; font-weight: bold; transition: 0.3s; }
        .sidebar button:hover { background: var(--main-green); transform: translateX(5px); }
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; width: 100%; }
        .app-card { background: var(--card-bg); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid var(--border-color); transition: 0.4s; }
        .app-card:hover { transform: scale(1.05); border-color: var(--main-green); }
        .app-card img { width: 90px; height: 90px; border-radius: 20px; margin-bottom: 12px; background: #21262d; padding: 5px; }
        .app-card h4 { margin: 10px 0 5px; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-card p { font-size: 12px; color: #8b949e; margin-bottom: 15px; }
        .btn-dl { display: block; background: var(--main-green); color: white; text-decoration: none; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .btn-dl:hover { background: #2ea043; box-shadow: 0 0 15px rgba(46, 160, 67, 0.4); }
        
        /* İndirme Sayfası Görünümü */
        #downloadUI { display: none; text-align: center; padding: 50px; }
        .progress-bar { width: 100%; max-width: 500px; background: #30363d; height: 15px; border-radius: 10px; margin: 30px auto; overflow: hidden; }
        .fill { background: var(--main-green); height: 100%; width: 0%; transition: 0.1s; }

        @media (max-width: 768px) { .container { flex-direction: column; } .sidebar { width: 100%; display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; } .sidebar button { min-width: 120px; margin: 0; } #searchInput { width: 150px; } }
    </style>
</head>
<body>

    <div id="mainUI">
        <header>
            <div class="logo" onclick="location.reload()">DES<span>Store</span></div>
            <input type="text" id="searchInput" placeholder="150+ uygulama ara..." onkeyup="searchApp()">
        </header>

        <div class="container">
            <aside class="sidebar">
                <button onclick="filterCat('Hepsi')">🎮 Hepsi</button>
                <button onclick="filterCat('Oyun')">🕹️ Oyunlar</button>
                <button onclick="filterCat('Popüler')">🔥 En Popüler</button>
                <button onclick="filterCat('Araçlar')">🛠️ Araçlar</button>
                <button onclick="filterCat('Sosyal')">💬 Sosyal</button>
            </aside>
            <main id="appGrid" class="app-grid"></main>
        </div>
    </div>

    <div id="downloadUI">
        <h2 id="dlAppName">Uygulama Hazırlanıyor</h2>
        <p id="dlStatus">Güvenlik kontrolü yapılıyor...</p>
        <div class="progress-bar"><div id="progress" class="fill"></div></div>
        <p id="dlWait">Lütfen bekleyin, APK oluşturuluyor...</p>
    </div>

    <script>
        // 150 Uygulamalık Veri Seti (Otomatik oluşturulmuştur)
        const apps = [
            { id: 100, name: "SJ App Pro", cat: "Oyun", pop: true, icon: "https://img.icons8.com/fluency/100/star.png", apk: "https://github.com/bro635756-spec/SJ-Store/raw/main/SJ_app.apk" },
            { id: 1, name: "Brawl Stars", cat: "Oyun", pop: true, icon: "https://img.icons8.com/color/100/brawl-stars.png", apk: "https://d.taptap.io/latest/brawlstars.apk" },
            { id: 2, name: "PUBG Mobile", cat: "Oyun", pop: true, icon: "https://img.icons8.com/color/100/pubg.png", apk: "https://pubgmobile.live/apk" },
            { id: 3, name: "WhatsApp Plus", cat: "Sosyal", pop: true, icon: "https://img.icons8.com/color/100/whatsapp.png", apk: "https://cdn.whatsapp.net/android/2.21.11.17/WhatsApp.apk" },
            { id: 4, name: "Minecraft PE", cat: "Oyun", pop: true, icon: "https://img.icons8.com/color/100/minecraft-main.png", apk: "#" },
            { id: 5, name: "Roblox", cat: "Oyun", pop: true, icon: "https://img.icons8.com/color/100/roblox.png", apk: "#" }
        ];

        // 150 Uygulamaya tamamlayan döngü (Burak için rastgele popüler isimler)
        const categories = ["Oyun", "Araçlar", "Sosyal", "Eğitim", "Müzik"];
        for(let i=6; i<=150; i++) {
            apps.push({
                id: i,
                name: `Uygulama ${i}`,
                cat: categories[Math.floor(Math.random() * categories.length)],
                pop: Math.random() > 0.7,
                icon: `https://picsum.photos/id/${i+10}/100/100`,
                apk: "#"
            });
        }

        function displayApps(list) {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = list.map(app => `
                <div class="app-card">
                    <img src="${app.icon}" onerror="this.src='https://img.icons8.com/fluency/100/box.png'">
                    <h4>${app.name}</h4>
                    <p>${app.cat}</p>
                    <a href="javascript:startDownload(${app.id})" class="btn-dl">APK İNDİR</a>
                </div>
            `).join('');
        }

        function searchApp() {
            let term = document.getElementById('searchInput').value.toLowerCase();
            displayApps(apps.filter(a => a.name.toLowerCase().includes(term)));
        }

        function filterCat(c) {
            if(c === 'Hepsi') displayApps(apps);
            else if(c === 'Popüler') displayApps(apps.filter(a => a.pop));
            else displayApps(apps.filter(a => a.cat === c));
        }

        function startDownload(id) {
            const app = apps.find(a => a.id === id);
            document.getElementById('mainUI').style.display = 'none';
            document.getElementById('downloadUI').style.display = 'block';
            document.getElementById('dlAppName').innerText = app.name + " İndiriliyor";
            
            let p = 0;
            const fill = document.getElementById('progress');
            const status = document.getElementById('dlStatus');

            const timer = setInterval(() => {
                p += 2;
                fill.style.width = p + "%";
                if(p === 40) status.innerText = "APK Analiz ediliyor...";
                if(p === 80) status.innerText = "İndirme başlatılıyor...";
                if(p >= 100) {
                    clearInterval(timer);
                    if(app.apk !== "#") window.location.href = app.apk;
                    else alert("Bu demo uygulama için APK linki henüz eklenmedi!");
                    setTimeout(() => location.reload(), 3000);
                }
            }, 50);
        }

        window.onload = () => displayApps(apps);
    </script>
</body>
                                                                  </html>
